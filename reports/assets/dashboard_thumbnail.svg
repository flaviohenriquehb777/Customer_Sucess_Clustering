<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0F1117"/>
      <stop offset="1" stop-color="#151A27"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#378ADD" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#378ADD" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#378ADD" stop-opacity="0.0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="70" y="110" width="1060" height="440" rx="18" fill="#1A1D27" stroke="#2A2D3E" stroke-width="2" filter="url(#shadow)"/>

